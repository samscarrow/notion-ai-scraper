# ─────────────────────────────────────────────────────────
# WRITERS-ROOM CONTRACTS (Creative type)
# ─────────────────────────────────────────────────────────
#
# The writers-room pipeline operates on pontius_scene_items,
# not work_items. Its contracts are defined in:
#   pontius/writers-room/PONTIUS_LAB_CONTRACTS.yaml
#
# Three agents: Historical Prosecutor (Step 1),
# Canon Steward (Steps 2-4), Dramatic Architect (Steps 5-7).
#
# When Type=Creative Work Items dispatch into the writers-room,
# the Lab Dispatcher creates a row in pontius_scene_items and
# stamps the entry signal. The Scene Item's Human Review
# Requested At is the exit — handle_final_return reads it
# back to the parent Work Item.
#
# V22 (writers_room_config_valid) applies only when
# execution_lane == "writers-room". Skips V17 (repo_ready).
#
# See: cli/contracts/pontius_scene_items.schema.json
# See: cli/contracts/writers_room_step_output.schema.json
