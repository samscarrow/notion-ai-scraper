contracts:
  - name: dispatch_via_native_dispatch
    source: work_items
    target: native_dispatch_webhook
    database: work_items
    trigger_fields:
      - Dispatch Via
    produced_fields:
      - Dispatch Requested Received At
    required_artifacts:
      - Dispatch Requested Received At
    selector: {}
    upstream_complete_fields:
      - Dispatch Via
    evidence_sources:
      - kind: native_automation
        database: work_items
        note: Dispatch Via change stamps Dispatch Requested Received At and calls the webhook.

  - name: dispatch_request_to_dispatcher
    source: work_items
    target: lab_dispatcher
    database: work_items
    rollout_started_at: "2026-03-21T00:00:00+00:00"
    trigger_fields:
      - Dispatch Requested Received At
    consumed_fields:
      - Dispatch Requested Consumed At
    produced_fields:
      - Prompt Notes
      - GitHub Issue URL
      - Prompt Request Received At
    required_artifacts:
      - Dispatch Requested Consumed At
      - Prompt Request Received At
      - Prompt Notes
    selector: {}
    upstream_complete_fields:
      - Dispatch Requested Received At
    required_access: read_and_write
    evidence_sources:
      - kind: agent_trigger
        agent: lab_dispatcher
      - kind: repo_enforced
        path: cli/dispatch.py

  - name: prompt_request_to_prompt_architect
